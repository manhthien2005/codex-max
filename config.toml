# ─────────────────────────────────────────────────────────────────────────────
# WSL-FIRST CODEX HOME
# Canonical runtime home: /home/<user>/.codex
# This config intentionally avoids Windows-native launchers and trust entries.
# See docs/INSTALLATION.md for the full setup checklist.
# ─────────────────────────────────────────────────────────────────────────────
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
developer_instructions = "Follow AGENTS.md in the active repo. Prefer WSL-native tools and ~/.codex runtime assets. Use MCP servers when they help, but degrade gracefully when optional local services are unavailable."

[features]
multi_agent = true
codex_hooks = true

[projects."/home/mrthien"]
trust_level = "trusted"

[projects."/home/mrthien/.codex"]
trust_level = "trusted"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.tools."*"]
approval_mode = "auto"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.exa.tools."*"]
approval_mode = "auto"

[mcp_servers.memory]
command = "bash"
args = ["-lc", "~/.codex/scripts/run-with-nvm.sh ~/.codex/mcp/npm/node_modules/.bin/mcp-server-memory"]
startup_timeout_sec = 60.0

[mcp_servers.memory.tools."*"]
approval_mode = "auto"

[mcp_servers.playwright]
command = "bash"
args = ["-lc", "~/.codex/scripts/run-with-nvm.sh ~/.codex/mcp/npm/node_modules/.bin/playwright-mcp --extension"]
startup_timeout_sec = 60.0

[mcp_servers.playwright.tools."*"]
approval_mode = "auto"

[mcp_servers.sequential-thinking]
command = "bash"
args = ["-lc", "~/.codex/scripts/run-with-nvm.sh ~/.codex/mcp/npm/node_modules/.bin/mcp-server-sequential-thinking"]
startup_timeout_sec = 60.0

[mcp_servers.sequential-thinking.tools."*"]
approval_mode = "auto"

[mcp_servers.gitnexus]
command = "bash"
args = ["-lc", "~/.codex/scripts/run-with-nvm.sh ~/.codex/mcp/npm/node_modules/.bin/gitnexus mcp"]
startup_timeout_sec = 60.0

[mcp_servers.gitnexus.tools."*"]
approval_mode = "auto"

[mcp_servers.gitnexus.tools.query]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.context]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.impact]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.detect_changes]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.route_map]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.api_impact]
approval_mode = "approve"

[mcp_servers.gitnexus.tools.shape_check]
approval_mode = "approve"

[mcp_servers.qdrant]
command = "bash"
args = ["-lc", "~/.codex/mcp/qdrant/run-qdrant-mcp.sh"]
startup_timeout_sec = 45.0

[mcp_servers.qdrant.tools."*"]
approval_mode = "auto"

[mcp_servers.semantic_qdrant_http]
command = "bash"
args = ["-lc", "~/.codex/mcp/semantic/run-semantic-qdrant-stdio.sh"]
startup_timeout_sec = 60.0

[mcp_servers.semantic_qdrant_http.tools."*"]
approval_mode = "auto"

[mcp_servers.mempalace]
command = "bash"
args = ["-lc", "~/.codex/mcp/mempalace/run-mempalace-mcp.sh"]
startup_timeout_sec = 120.0

[mcp_servers.mempalace.tools."*"]
approval_mode = "auto"

[mcp_servers.mempalace.tools.mempalace_status]
approval_mode = "approve"

[mcp_servers.mempalace.tools.mempalace_search]
approval_mode = "approve"

[mcp_servers.mempalace.tools.mempalace_diary_write]
approval_mode = "approve"

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "cached"

[profiles.live-web]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

[plugins."github@openai-curated"]
enabled = true
